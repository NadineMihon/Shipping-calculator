<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../icon/logo.svg" type="image/svg+xml">
    <title>Shipping calculator</title>
    <link rel="stylesheet" href="../CSS/main.css">
</head>

<body>
    <main class="main">
        <div class="calculator-wrapper">
            <div class="calculator">
                <form class="calculator-form">
                    <label class="input-field">
                        Город доставки:
                        <input type="text" placeholder="Введите город" class="input"/>
                    </label>
                    <label class="input-field">
                        Вес посылки:
                        <input type="text" placeholder="Введите вес посылки" class="input"/>
                    </label>
                    <div class="button-wrapper">
                        <button class="button">Рассчитать</button>    
                    </div>
                    <label class="input-field">
                        Стоимость доставки:
                        <input type="text" class="input" readonly/>
                    </label>
                </form>
            </div>
        </div>
    </main>
    <script src="../JS/index.js" type="text/javascript"></script>
</body>
</html>
