<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../icon/logo.svg" type="image/svg+xml">
    <title>Shipping calculator</title>
    <link rel="stylesheet" href="../CSS/main.css">
</head>

<body>
    <main class="main">
        <div class="calculator-wrapper">
            <div class="calculator">
                <form id="form" class="calculator-form">
                    <label class="input-field">
                        Город доставки:
                        <input type="text" placeholder="Введите город" id="city" class="input" required/>
                    </label>
                    <label class="input-field">
                        Вес посылки:
                        <input type="number" placeholder="Введите вес посылки" id="weight" class="input" required/>
                    </label>
                    <div class="button-wrapper">
                        <button id="button" class="button" type="submit">Рассчитать</button>    
                    </div>
                    <label class="input-field">
                        Стоимость доставки:
                        <input type="text" id="delivery-cost" class="input" readonly/>
                    </label>
                </form>
            </div>
        </div>
    </main>
    <script src="../JS/index.js" type="text/javascript"></script>
</body>
</html>
